# VERITAS//FEED — local infrastructure
# Start with: docker compose -f backend/docker-compose.yml up -d
#
# NOTE: Ollama runs natively on the host (ollama serve). The Python services
# reach it at http://host.docker.internal:11434 (mac/win) or http://localhost:11434
# when run on the host directly. This avoids GPU passthrough complications.

services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: veritas-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"
      - "9644:9644"
      - "8082:8082"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:latest
    container_name: veritas-redpanda-console
    depends_on: [redpanda]
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    container_name: veritas-postgres
    environment:
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
      POSTGRES_DB: veritas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: veritas-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana-oss:latest
    container_name: veritas-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  redpanda-data:
  postgres-data:
  prometheus-data:
  grafana-data:
