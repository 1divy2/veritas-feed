apiVersion: apps/v1
kind: Deployment
metadata:
  name: veritas-redis
  namespace: veritas-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: veritas-redis
  template:
    metadata:
      labels:
        app: veritas-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: veritas-redis-svc
  namespace: veritas-prod
spec:
  selector:
    app: veritas-redis
  ports:
  - port: 6379
    targetPort: 6379
